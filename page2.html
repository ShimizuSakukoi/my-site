<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>第二页 - 我的网站</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='80' font-size='80'>📄</text></svg>">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        header {
            background: rgba(0,0,0,0.2);
            color: #fff;
            width: 100%;
            padding: 20px;
            text-align: center;
        }
        .card {
            background: #fff;
            border-radius: 12px;
            padding: 30px;
            margin: 40px 20px;
            max-width: 500px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            text-align: center;
        }
        .card h2 { color: #333; margin-bottom: 15px; }
        .card p { color: #666; line-height: 1.8; }
        .link {
            display: inline-block;
            padding: 12px 28px;
            background: #f5576c;
            color: #fff;
            text-decoration: none;
            border-radius: 6px;
            font-size: 16px;
            margin: 8px;
            transition: transform 0.2s;
        }
        .link:hover { transform: scale(1.05); }
    </style>
</head>
<body>
    <header>
        <h1>第二页</h1>
    </header>

    <div class="card">
        <h2>欢迎来到第二页</h2>
        <p>你成功跳转过来了！</p>
        <a class="link" href="index.html">返回首页</a>
    </div>
</body>
</html>
